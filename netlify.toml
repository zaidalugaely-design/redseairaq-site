[build]
  command         = "node scripts/generate-og-pages.js"
  functions       = "netlify/functions"
  publish         = "."

[functions]
  node_bundler = "esbuild"

# SPA catch-all — serves index.html for any path with no matching file
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
