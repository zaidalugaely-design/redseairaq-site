[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path     = "/product/*"
  function = "og-preview"

# SPA catch-all — serves index.html for any path with no matching file
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
