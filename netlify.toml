[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/"
  to     = "/.netlify/functions/og-preview?product=:product"
  status = 200
  query  = {product = ":product"}

[[redirects]]
  from   = "/product/:id"
  to     = "/.netlify/functions/og-preview?product=:id"
  status = 200
